name: Bug report
description: Report a problem with this togo plugin
labels: [bug]
body:
  - type: textarea
    id: what
    attributes: { label: What happened?, description: A clear description of the bug + steps to reproduce. }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: togo / plugin version }
  - type: textarea
    id: env
    attributes: { label: Environment, description: OS, Go version, relevant env vars (redact secrets). }
