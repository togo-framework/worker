name: CI
on:
  push: { branches: [main, master] }
  pull_request:
permissions: { contents: read }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -count=1
