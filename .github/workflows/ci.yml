name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - run: go build ./...
      - run: go test ./...
      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -quiet ./... || true
